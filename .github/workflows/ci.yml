name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8 app/ src/ tests/ --max-line-length=120

      - name: Run black check
        run: black --check app/ src/ tests/ --line-length=120

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=70
        env:
          ARTIFACT_DIR: ${{ github.workspace }}/artifacts

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install DVC with S3 support
        run: pip install dvc[s3]

      - name: Configure DVC remote credentials
        run: |
          dvc remote modify myremote access_key_id ${{ secrets.DVC_ACCESS_KEY_ID }}
          dvc remote modify myremote secret_access_key ${{ secrets.DVC_SECRET_ACCESS_KEY }}

      - name: Pull artifacts from DVC
        run: dvc pull artifacts/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t smart-crop-api:test .

      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 8000:8000 \
            -e ARTIFACT_DIR=/app/artifacts \
            -e CROP_MODEL_NAME=ResidualCatBoost_RF \
            smart-crop-api:test
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-container && exit 1)
          docker stop test-container
          docker rm test-container
