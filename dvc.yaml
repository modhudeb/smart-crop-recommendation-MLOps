stages:
  data_ingestion:
    cmd: python src/crop_recommendation/pipeline/data_ingestion.py
    deps:
      - src/crop_recommendation/pipeline/data_ingestion.py
      - data/external/SPAS-Dataset-BD.csv
    outs:
      - data/raw/SPAS-Dataset-BD.csv

  preprocess:
    cmd: python src/crop_recommendation/pipeline/preprocessing.py
    deps:
      - src/crop_recommendation/pipeline/preprocessing.py
      - data/raw/SPAS-Dataset-BD.csv
    outs:
      - data/processed/processed_data.csv

  encode:
    cmd: python src/crop_recommendation/pipeline/encoding.py
    deps:
      - src/crop_recommendation/pipeline/encoding.py
      - data/processed/processed_data.csv
    outs:
      - data/processed/encoded_data.csv

  feature_engineering:
    cmd: python src/crop_recommendation/pipeline/feature_engineering.py
    deps:
      - src/crop_recommendation/pipeline/feature_engineering.py
      - data/processed/encoded_data.csv
    outs:
      - data/features/featured_data.csv

  split_data:
    cmd: python src/crop_recommendation/pipeline/splitter.py
    deps:
      - src/crop_recommendation/pipeline/splitter.py
      - data/features/featured_data.csv
    outs:
      - data/splits/train.csv
      - data/splits/test.csv

  prepare_artifacts:
    cmd: echo "Artifacts prepared"
    deps:
      - artifacts/preprocessors/label_encoders.joblib
      - artifacts/preprocessors/standard_scaler.joblib
      - artifacts/preprocessors/climate_constants.joblib
      - artifacts/preprocessors/feature_columns.joblib
      - artifacts/models/ResidualCatBoost_RF.joblib
    outs:
      - artifacts/preprocessors/label_encoders.joblib
      - artifacts/preprocessors/standard_scaler.joblib
      - artifacts/preprocessors/climate_constants.joblib
      - artifacts/preprocessors/feature_columns.joblib
      - artifacts/models/ResidualCatBoost_RF.joblib

  train_model:
    cmd: python src/crop_recommendation/pipeline/model_training.py
    deps:
      - src/crop_recommendation/pipeline/model_training.py
      - data/splits/train.csv
      - artifacts/preprocessors/label_encoders.joblib
      - artifacts/preprocessors/standard_scaler.joblib
      - artifacts/preprocessors/climate_constants.joblib
    metrics:
      - reports/metrics/training_results.csv:
          cache: false

  evaluate_model:
    cmd: python src/crop_recommendation/pipeline/model_eval.py
    deps:
      - src/crop_recommendation/pipeline/model_eval.py
      - data/splits/test.csv
    metrics:
      - reports/metrics/evaluation_metrics.json:
          cache: false
    outs:
      - reports/metrics/confusion_matrix.png:
          cache: false
